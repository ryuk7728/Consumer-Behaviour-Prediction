<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Northstar Outfitters</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="sub-header">
      <a class="nav-link" href="/cart.html">Back to Cart</a>
      <a class="nav-link" href="/">Storefront</a>
    </header>

    <main class="checkout-wrap">
      <section class="panel">
        <h1>Checkout</h1>
        <p class="muted">Complete sample details and place the order.</p>
        <form id="checkoutForm" class="checkout-form">
          <label>Full Name<input required name="name" placeholder="Alex Morgan" /></label>
          <label>Email<input required type="email" name="email" placeholder="alex@email.com" /></label>
          <label>Address<input required name="address" placeholder="123 Greenview St" /></label>
          <button class="btn btn-primary" type="submit">Place Order</button>
        </form>
        <p id="checkoutMessage" class="muted"></p>
      </section>

      <aside class="panel summary-panel">
        <h2>Final Summary</h2>
        <ul id="checkoutItems" class="cart-items cart-detailed"></ul>
        <p class="muted">Total</p>
        <p id="checkoutTotal" class="product-price">$0</p>
      </aside>
    </main>

    <script type="module" src="/checkout.js"></script>
  </body>
</html>
